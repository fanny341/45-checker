name: Build APK

on:
  push:
    branches: [ main ]
    paths:
      - 'assets/**'
      - 'template/**'
      - 'build.sh'
      - 'AndroidManifest.xml'
      - 'res/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 1.1.0)'
        required: false
        default: '1.1.0'
      version_code:
        description: 'Version code (e.g. 1)'
        required: false
        default: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Android SDK (use pre-installed)
      run: |
        # GitHub runner has Android SDK pre-installed at /usr/local/lib/android/sdk
        ANDROID_HOME="/usr/local/lib/android/sdk"
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        
        # Find latest build-tools
        BUILD_TOOLS_DIR=$(ls -1d $ANDROID_HOME/build-tools/* 2>/dev/null | sort -V | tail -1)
        if [ -z "$BUILD_TOOLS_DIR" ]; then
          echo "No build-tools found. Installing..."
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0" "platforms;android-33" 2>&1 | tail -5
          BUILD_TOOLS_DIR=$(ls -1d $ANDROID_HOME/build-tools/* 2>/dev/null | sort -V | tail -1)
        fi
        echo "Using build-tools: $BUILD_TOOLS_DIR"
        echo "$BUILD_TOOLS_DIR" >> $GITHUB_PATH
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

    - name: Make build script executable
      run: chmod +x build.sh

    - name: Build APK
      run: |
        VERSION="${{ github.event.inputs.version || '1.1.0' }}"
        VCODE="${{ github.event.inputs.version_code || '1' }}"
        bash build.sh "$VERSION" "$VCODE"

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: GP45-APK
        path: output/GP45_*.apk
        retention-days: 30

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: output/GP45_*.apk
        generate_release_notes: true
        token: ${{ secrets.GITHUB_TOKEN }}
