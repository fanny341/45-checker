name: Build GP45 Hybrid

on:
  push:
    branches: [ "hybrid" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      
      - name: Generate Wrapper & Build
        run: |
          gradle wrapper --gradle-version=8.7
          ./gradlew assembleDebug
      
      - name: Sign APK (debug)
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk GP45_Hybrid_v1.0.apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GP45-Hybrid-v1.0
          path: GP45_Hybrid_v1.0.apk
