name: Build APK

on:
  push:
    branches: [ main ]
    paths:
      - 'assets/**'
      - 'template/**'
      - 'build.sh'
      - 'AndroidManifest.xml'
      - 'res/**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version name (e.g. 1.1.0)'
        required: false
        default: '1.1.0'
      version_code:
        description: 'Version code (e.g. 1)'
        required: false
        default: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: false

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 10406988

    - name: Install Android build tools
      run: |
        sdkmanager "build-tools;34.0.0" "platforms;android-33" 2>&1 | tail -5
        echo "$ANDROID_HOME/build-tools/34.0.0" >> $GITHUB_PATH

    - name: Make build script executable
      run: chmod +x build.sh

    - name: Build APK
      run: |
        VERSION="${{ github.event.inputs.version || '1.1.0' }}"
        VCODE="${{ github.event.inputs.version_code || '1' }}"
        bash build.sh "$VERSION" "$VCODE"

    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: GP45-APK
        path: output/GP45_*.apk
        retention-days: 30

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: output/GP45_*.apk
        generate_release_notes: true
        token: ${{ secrets.GITHUB_TOKEN }}
