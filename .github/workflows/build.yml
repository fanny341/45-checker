name: Build GP45 Native APK

on:
  push:
    branches: [ "native-v1", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Wrapper & Build
        run: |
          gradle wrapper --gradle-version=8.7
          ./gradlew assembleRelease

      - name: Sign APK
        run: |
          export ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}
          BUILD_TOOLS=$(ls -1 "$ANDROID_SDK_ROOT/build-tools/" | sort -V | tail -1)
          export PATH="$ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS:$PATH"
          keytool -genkey -v -keystore debug.keystore -alias gp45 \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=GP45, OU=GP45, O=GP45, L=Jakarta, ST=Indonesia, C=ID"
          cp app/build/outputs/apk/release/app-release-unsigned.apk app-unsigned.apk
          zipalign -f 4 app-unsigned.apk app-aligned.apk
          apksigner sign --ks debug.keystore --ks-pass pass:android \
            --ks-key-alias gp45 --out GP45_Native_v1.0.0.apk app-aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GP45-Native-v1.0.0
          path: GP45_Native_v1.0.0.apk
